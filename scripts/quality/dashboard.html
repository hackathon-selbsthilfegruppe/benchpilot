<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quality Dashboard — BenchPilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            passed: { light: "#22c55e", dark: "#4ade80" },
            failed: { light: "#ef4444", dark: "#f87171" },
            warned: { light: "#f59e0b", dark: "#fbbf24" },
            muted:  { light: "#94a3b8", dark: "#64748b" },
          },
        },
      },
    };
  </script>
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .bar-bg { background-color: rgba(148, 163, 184, 0.2); }
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }
    .arrow { transition: transform 0.15s ease; }
    details[open] .arrow { transform: rotate(90deg); }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen transition-colors">
  <header class="sticky top-0 z-20 border-b border-gray-200 bg-white/90 backdrop-blur dark:border-gray-800 dark:bg-gray-950/90">
    <div class="mx-auto flex max-w-7xl items-center gap-4 px-6 py-3">
      <h1 class="text-lg font-semibold tracking-tight">Quality Gate <span class="text-gray-400 dark:text-gray-500">— BenchPilot</span></h1>
      <span id="overall-pill" class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-wider">…</span>
      <span id="meta-bar" class="ml-4 hidden gap-4 text-xs text-gray-500 dark:text-gray-400 md:flex"></span>
      <div class="ml-auto flex items-center gap-2">
        <button id="expand-all" class="rounded-md border border-gray-200 bg-white px-3 py-1 text-xs hover:bg-gray-50 dark:border-gray-800 dark:bg-gray-900 dark:hover:bg-gray-800">Expand all</button>
        <button id="collapse-all" class="rounded-md border border-gray-200 bg-white px-3 py-1 text-xs hover:bg-gray-50 dark:border-gray-800 dark:bg-gray-900 dark:hover:bg-gray-800">Collapse all</button>
        <button id="theme-toggle" aria-label="Toggle theme" class="rounded-md border border-gray-200 bg-white px-3 py-1 text-xs hover:bg-gray-50 dark:border-gray-800 dark:bg-gray-900 dark:hover:bg-gray-800">☼ / ☾</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-6 py-6">
    <section id="kpis" class="mb-6 grid grid-cols-2 gap-3 sm:grid-cols-4"></section>
    <section id="sections" class="space-y-4"></section>

    <details class="mt-8 rounded-lg border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900">
      <summary class="flex items-center gap-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
        <span class="arrow">▸</span> Full log tail
      </summary>
      <pre id="log" class="mono mt-3 max-h-96 overflow-auto whitespace-pre-wrap rounded bg-gray-50 p-3 text-[11px] leading-relaxed text-gray-700 dark:bg-gray-950 dark:text-gray-300"></pre>
    </details>

    <p class="mt-8 text-xs text-gray-500 dark:text-gray-400">
      Reload after a fresh <code class="mono">scripts/quality/quality-check.sh</code> run to refresh data.
    </p>
  </main>

  <script src="../../.local/quality-data/data.js" onerror="window.QUALITY_DATA=null"></script>
  <script>
    /* ───── theme toggle ───── */
    const root = document.documentElement;
    const stored = localStorage.getItem("qg-theme");
    if (stored === "light") root.classList.remove("dark");
    if (stored === "dark") root.classList.add("dark");
    document.getElementById("theme-toggle").addEventListener("click", () => {
      root.classList.toggle("dark");
      localStorage.setItem("qg-theme", root.classList.contains("dark") ? "dark" : "light");
    });

    /* ───── helpers ───── */
    const esc = (s) => String(s).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    const fmtMs = (ms) => (ms == null ? "" : `${(ms / 1000).toFixed(2)}s`);
    const fmtPct = (p) => (p == null ? "—" : `${p.toFixed(1)}%`);

    function pill(text, classes) {
      return `<span class="inline-flex items-center rounded-full px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wider ${classes}">${esc(text)}</span>`;
    }
    function statusPill(status) {
      if (status === "passed") return pill("passed", "bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300");
      if (status === "failed") return pill("failed", "bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300");
      if (status === "skipped") return pill("skipped", "bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-300");
      return pill(status || "?", "bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-300");
    }
    function severityPill(label, count, palette) {
      if (!count) return "";
      return pill(`${label} ${count}`, palette);
    }
    function bar(pct, color = "bg-emerald-500") {
      const p = Math.max(0, Math.min(100, pct ?? 0));
      return `
        <div class="bar-bg h-1.5 w-full overflow-hidden rounded">
          <div class="h-full ${color}" style="width:${p}%"></div>
        </div>`;
    }
    function coverageColor(pct) {
      if (pct == null) return "bg-gray-400";
      if (pct >= 90) return "bg-emerald-500";
      if (pct >= 75) return "bg-yellow-500";
      if (pct >= 50) return "bg-orange-500";
      return "bg-rose-500";
    }
    function kpiCard(label, value, sub, badge) {
      return `
        <div class="rounded-lg border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900">
          <div class="flex items-center justify-between">
            <div class="text-[10px] font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">${esc(label)}</div>
            ${badge ?? ""}
          </div>
          <div class="mt-1 text-xl font-semibold">${value}</div>
          ${sub ? `<div class="mt-0.5 text-xs text-gray-500 dark:text-gray-400">${sub}</div>` : ""}
        </div>`;
    }

    /* ───── kind-specific renderers ───── */
    function renderTypecheck(c) {
      return `<p class="text-sm text-gray-600 dark:text-gray-400">${c.status === "passed" ? "No type errors." : "Type errors — see log below."}</p>`;
    }

    function renderLint(c) {
      const d = c.data || {};
      const badges = [
        severityPill("errors", d.errors, "bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300"),
        severityPill("warnings", d.warnings, "bg-yellow-100 text-yellow-800 dark:bg-yellow-900/40 dark:text-yellow-300"),
      ].join(" ");
      const summary = (d.errors || 0) + (d.warnings || 0) === 0
        ? `<p class="text-sm text-gray-600 dark:text-gray-400">${d.files_total ?? 0} file(s) scanned, no issues.</p>`
        : `<p class="text-sm text-gray-600 dark:text-gray-400">${d.files_with_issues ?? 0} of ${d.files_total ?? "?"} files with issues.</p>`;
      const top = (d.top_rules || [])
        .map((r) => `<li class="flex justify-between"><code class="mono text-xs">${esc(r.rule)}</code><span class="mono text-xs text-gray-500">${r.count}</span></li>`)
        .join("");
      return `
        ${badges ? `<div class="mb-3 flex gap-1">${badges}</div>` : ""}
        ${summary}
        ${top ? `<ul class="mt-3 max-h-56 space-y-1 overflow-auto rounded border border-gray-200 bg-gray-50 p-3 text-xs dark:border-gray-800 dark:bg-gray-950">${top}</ul>` : ""}`;
    }

    function renderTest(c) {
      const d = c.data || {};
      const bits = [];
      if (d.tests_total != null) {
        bits.push(`<span class="mono text-xs"><span class="font-semibold">${d.tests_passed ?? 0}</span> passed${d.tests_failed ? ` / <span class="text-rose-500">${d.tests_failed} failed</span>` : ""} of ${d.tests_total}</span>`);
      }
      if (d.files_total != null) {
        bits.push(`<span class="mono text-xs text-gray-500">${d.files_passed ?? 0}/${d.files_total} files</span>`);
      }
      if (d.duration_text) {
        bits.push(`<span class="mono text-xs text-gray-500">${esc(d.duration_text)}</span>`);
      }
      let coverage = "";
      if (d.coverage) {
        const k = ["lines", "statements", "branches", "functions"]
          .map((key) => {
            const s = d.coverage[key];
            if (!s) return "";
            return `
              <div class="rounded border border-gray-200 bg-gray-50 p-3 dark:border-gray-800 dark:bg-gray-950">
                <div class="flex items-center justify-between text-[10px] font-semibold uppercase tracking-wider text-gray-500">${key}</div>
                <div class="mt-1 text-base font-semibold">${fmtPct(s.pct)}</div>
                <div class="mt-1 text-[11px] text-gray-500">${s.covered ?? 0}/${s.total ?? 0}</div>
                <div class="mt-2">${bar(s.pct, coverageColor(s.pct))}</div>
              </div>`;
          })
          .join("");
        coverage = `<div class="mt-3 grid grid-cols-2 gap-2 sm:grid-cols-4">${k}</div>`;
      }
      return `
        <div class="flex flex-wrap items-center gap-3">${bits.join("")}</div>
        ${coverage}`;
    }

    function renderAudit(c) {
      const d = c.data || {};
      const sev = (label, count, palette) =>
        count > 0
          ? pill(`${label} ${count}`, palette)
          : "";
      const badges = [
        sev("critical", d.critical, "bg-rose-200 text-rose-900 dark:bg-rose-900/50 dark:text-rose-200"),
        sev("high", d.high, "bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300"),
        sev("moderate", d.moderate, "bg-yellow-100 text-yellow-800 dark:bg-yellow-900/40 dark:text-yellow-300"),
        sev("low", d.low, "bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300"),
        sev("info", d.info, "bg-gray-100 text-gray-800 dark:bg-gray-800 dark:text-gray-300"),
      ].filter(Boolean).join(" ");
      const total = d.total ?? 0;
      return `
        ${badges ? `<div class="mb-3 flex flex-wrap gap-1">${badges}</div>` : ""}
        <p class="text-sm text-gray-600 dark:text-gray-400">${total} vulnerabilit${total === 1 ? "y" : "ies"} found by <code class="mono text-xs">npm audit</code>.</p>`;
    }

    function renderBuild(c) {
      return `<p class="text-sm text-gray-600 dark:text-gray-400">${c.status === "passed" ? "Production build succeeded." : "Build failed — see log below."}</p>`;
    }

    function renderGeneric(c) {
      return `<p class="text-sm text-gray-600 dark:text-gray-400">${esc(c.label)}</p>`;
    }

    function renderA11y(c) {
      const d = c.data || {};
      const bits = [];
      if (d.tests_total != null) {
        bits.push(`<span class="mono text-xs"><span class="font-semibold">${d.tests_passed ?? 0}</span> axe assertions${d.tests_failed ? ` / <span class="text-rose-500">${d.tests_failed} violations</span>` : ""} of ${d.tests_total}</span>`);
      }
      if (d.duration_text) {
        bits.push(`<span class="mono text-xs text-gray-500">${esc(d.duration_text)}</span>`);
      }
      const note = `<p class="mt-2 text-[11px] text-gray-500 dark:text-gray-400">jsdom can't check colour contrast — that lives in the Playwright suite (see <code class="mono">docs/accessibility.md</code>).</p>`;
      return `
        <div class="flex flex-wrap items-center gap-3">${bits.join("")}</div>
        ${note}`;
    }

    function renderE2e(c) {
      return `<p class="text-sm text-gray-600 dark:text-gray-400">${c.status === "passed" ? "Playwright suite green." : "Playwright suite failed — see Output tail."}</p>`;
    }

    const RENDERERS = {
      typecheck: renderTypecheck,
      lint: renderLint,
      test: renderTest,
      audit: renderAudit,
      build: renderBuild,
      a11y: renderA11y,
      e2e: renderE2e,
    };

    /* ───── card + section assembly ───── */
    function checkCard(c) {
      const renderer = RENDERERS[c.kind] || renderGeneric;
      const dot = c.status === "passed"
        ? "text-emerald-500"
        : c.status === "failed"
          ? "text-rose-500"
          : "text-gray-400";
      const symbol = c.status === "passed" ? "✓" : c.status === "failed" ? "✗" : "·";
      const detail = c.detail
        ? `
          <details class="mt-3">
            <summary class="text-xs text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
              <span class="arrow">▸</span> Output tail
            </summary>
            <pre class="mono mt-2 max-h-72 overflow-auto whitespace-pre-wrap rounded bg-gray-50 p-3 text-[11px] leading-relaxed text-gray-700 dark:bg-gray-950 dark:text-gray-300">${esc(c.detail)}</pre>
          </details>`
        : "";
      return `
        <article class="rounded-lg border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900">
          <header class="mb-3 flex items-center gap-3">
            <span class="${dot} mono text-base">${symbol}</span>
            <h3 class="font-semibold">${esc(c.label)}</h3>
            ${statusPill(c.status)}
            <span class="ml-auto mono text-xs text-gray-500">${fmtMs(c.duration_ms)}</span>
          </header>
          ${renderer(c)}
          ${detail}
        </article>`;
    }

    const SECTION_TITLES = {
      typecheck: "Typecheck",
      lint: "Lint",
      test: "Tests & Coverage",
      a11y: "Accessibility",
      e2e: "End-to-end",
      build: "Build",
      audit: "Dependency audit",
    };

    function section(kind, items) {
      const failed = items.filter((c) => c.status === "failed").length;
      const passed = items.filter((c) => c.status === "passed").length;
      const headerBadges = [
        passed ? pill(`${passed} passed`, "bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300") : "",
        failed ? pill(`${failed} failed`, "bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300") : "",
      ].filter(Boolean).join(" ");
      return `
        <details open class="rounded-xl border border-gray-200 bg-gray-50/40 p-4 dark:border-gray-800 dark:bg-gray-950/40">
          <summary class="flex items-center gap-3">
            <span class="arrow text-gray-400">▸</span>
            <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-700 dark:text-gray-300">${esc(SECTION_TITLES[kind] || kind)}</h2>
            <div class="ml-auto flex items-center gap-1">${headerBadges}</div>
          </summary>
          <div class="mt-3 space-y-3">
            ${items.map(checkCard).join("")}
          </div>
        </details>`;
    }

    /* ───── KPI strip ───── */
    function renderKpis(data) {
      const checks = data.checks || [];
      const failed = checks.filter((c) => c.status === "failed").length;
      const passed = checks.filter((c) => c.status === "passed").length;
      const totalDur = checks.reduce((acc, c) => acc + (c.duration_ms || 0), 0);

      const tests = checks.filter((c) => c.kind === "test");
      const totalTests = tests.reduce((a, c) => a + (c.data?.tests_total ?? 0), 0);
      const failedTests = tests.reduce((a, c) => a + (c.data?.tests_failed ?? 0), 0);

      const lint = checks.find((c) => c.kind === "lint");
      const lintErr = lint?.data?.errors ?? 0;
      const lintWarn = lint?.data?.warnings ?? 0;

      const audit = checks.find((c) => c.kind === "audit");
      const highSev = audit ? (audit.data?.critical ?? 0) + (audit.data?.high ?? 0) : null;

      const cards = [
        kpiCard(
          "Checks",
          `${passed}/${passed + failed}`,
          failed ? `${failed} failed` : "all passed",
          failed === 0
            ? pill("ok", "bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300")
            : pill("fail", "bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300"),
        ),
        kpiCard(
          "Tests",
          totalTests ? `${totalTests - failedTests}/${totalTests}` : "—",
          totalTests ? (failedTests ? `${failedTests} failed` : "all passing") : "no tests run",
          failedTests
            ? pill("fail", "bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300")
            : "",
        ),
        kpiCard(
          "Lint",
          lint ? `${lintErr} / ${lintWarn}` : "—",
          lint ? "errors / warnings" : "not run",
          lintErr
            ? pill("err", "bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300")
            : lintWarn
              ? pill("warn", "bg-yellow-100 text-yellow-800 dark:bg-yellow-900/40 dark:text-yellow-300")
              : "",
        ),
        kpiCard(
          "Audit",
          audit ? String(audit.data?.total ?? 0) : "—",
          audit ? `${highSev ?? 0} high+` : "not run",
          highSev
            ? pill("risk", "bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300")
            : audit
              ? pill("ok", "bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300")
              : "",
        ),
      ];
      document.getElementById("kpis").innerHTML = cards.join("");

      const overall = document.getElementById("overall-pill");
      if (failed === 0) {
        overall.textContent = "Passed";
        overall.className =
          "inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-wider bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300";
      } else {
        overall.textContent = "Failed";
        overall.className =
          "inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-wider bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300";
      }

      const meta = [
        `<span>Mode <span class="text-gray-700 dark:text-gray-200">${esc(data.mode || "—")}</span></span>`,
        `<span>Scope <span class="text-gray-700 dark:text-gray-200">${esc(data.scope || "—")}</span></span>`,
        `<span>Started <span class="text-gray-700 dark:text-gray-200">${esc(data.started_at || "—")}</span></span>`,
        `<span>Duration <span class="text-gray-700 dark:text-gray-200">${fmtMs(totalDur)}</span></span>`,
      ].join("");
      const bar = document.getElementById("meta-bar");
      bar.innerHTML = meta;
      bar.classList.remove("hidden");
    }

    /* ───── render ───── */
    function render() {
      const data = window.QUALITY_DATA;
      if (!data) {
        document.getElementById("overall-pill").textContent = "no data";
        document.getElementById("overall-pill").className =
          "inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-wider bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-300";
        document.getElementById("sections").innerHTML = `
          <p class="text-sm text-gray-500 dark:text-gray-400">No quality data found. Run <code class="mono">./scripts/quality/quality-check.sh --html</code>.</p>`;
        return;
      }

      renderKpis(data);

      // Group checks by kind, preserving the order they ran in.
      const order = [];
      const groups = {};
      for (const c of data.checks || []) {
        const k = c.kind || "other";
        if (!groups[k]) {
          groups[k] = [];
          order.push(k);
        }
        groups[k].push(c);
      }
      document.getElementById("sections").innerHTML = order
        .map((k) => section(k, groups[k]))
        .join("");

      document.getElementById("log").textContent = data.log_excerpt || "(log empty)";
    }

    render();

    /* ───── expand / collapse all ───── */
    function setAll(open) {
      document.querySelectorAll("details").forEach((d) => {
        d.open = open;
      });
    }
    document.getElementById("expand-all").addEventListener("click", () => setAll(true));
    document.getElementById("collapse-all").addEventListener("click", () => setAll(false));
  </script>
</body>
</html>
